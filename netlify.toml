# Netlify deployment configuration for App A — the Monday Morning Companion.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  # pdfkit ships font-metric data files — keep it unbundled so they travel
  # with the function.
  external_node_modules = ["pdfkit"]

# The frontend calls /api/export — route it to the serverless function.
# This redirect MUST come before the SPA fallback below.
[[redirects]]
  from = "/api/export"
  to = "/.netlify/functions/export"
  status = 200

# SPA fallback — client-side routes (e.g. /tools/heat-map) resolve to the app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
